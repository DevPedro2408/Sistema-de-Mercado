    <link rel="stylesheet" href="../Css/produtos.css">
    <title>Document</title>
</head>
<body>
    <div>Deu certo</div>

    <header class="cabecalho">
        <h1>Consultar Produtos</h1>
        <div></div>
    </header>
    <main>
        <div class="container-Pesquisar">
            <h2>Pesquisar Produto</h2>
            <input type="search" id="pesquisar">
        </div>
        
        <section>
            <h2>Cadastrar / Editar Produto</h2>

            <img src="../img/Designer Produtos.png" alt="">
            <input type="image" src="" alt="Adicionar Imagem">

            <div>
                <h2>Código de Barras</h2>
                <section class="container-codigo-descricao">
                    <label for="">Códido de barras</label>
                    <input type="number" class="inputsCodigoBarras" id="codigo-barras">

                    <label for="">Código interno</label>
                    <input type="number" class="inputsCodigoBarras" id="codigo-interno">
                    
                    <label for="">Descrição</label>
                    <input type="number" class="inputsCodigoBarras" id="Descricao">
                </section>
            </div>

            <div>
                <h2>Informações do Produto</h2>
                <section class="container-codigo-descricao">
                    <label for="">Categoria</label>
                    <input type="text" class="inputsCodigoBarras" id="Categoria">

                    <label for="">Quantidade em estoque</label>
                    <input type="number" class="inputsCodigoBarras" id="quantidade-estoque">

                    <label for="">Estoque mínimo</label>
                    <input type="number" class="inputsCodigoBarras" id="estoque-minimo">
                    
                    <label for="">Preço de venda</label>
                    <input type="number" class="inputsCodigoBarras" id="preco-venda">
                </section>
            </div>
        </section>

        <section class="sessaoBotoes">
            <button class="btn">Salvar</button>
            <button class="btn">Novo Produto</button>
            <button class="btn">Cancelar</button>
            <button class="btn">Excluir</button>
        </section>

        <section>
            <h2>Produtos Cadastrados</h2>
            <table class="tabela-produtos">
                <thead>
                    <tr>
                        <th>Código de Barras</th>
                    </tr>
                    <tr>
                        <th>Código Interno</th>
                    </tr>
                    <tr>
                        <th>Descrição</th>
                    </tr>
                    <tr>
                        <th>Preço de Venda</th>
                    </tr>
                    <tr>
                        <th>Estoque</th>
                    </tr>
                    <tr>
                        <th>Estoque Mínimo</th>
                    </tr>
                    <tr>
                        <th>Status</th>
                    </tr>
                    <tr>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="resultadoTable">

                </tbody>
            </table>
        </section>

    </main>
    <footer class="comandosNaTecla">
        <div><span id="f1">F1</span> - Salvar</div>
        <div><span id="f2">F2</span> - Novo Produto</div>
        <div><span id="f3">F3</span> - Cancelar</div>
        <div><span id="f4">F4</span> - Excluir</div>
    </footer>

    <script src="../Js/produtos.js"></script>
</body>
</html>
